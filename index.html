<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Re'ink Tattoo Artist School</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600&family=Dancing+Script:wght@400;500&display=swap" rel="stylesheet" />

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --white:#FFFFFF;
    --ivory:#F8F5EF;
    --beige:#E8DDCB;
    --light-gray:#F3F1EC;
    --ink:#1E1E1C;
    --soft-ink:#2A2926;
    --gray-text:#6F6A62;
    --gold:#B59A6A;
    --pale-gold:#D8C7A4;
    --line-beige:#CDBB9D;
    --charcoal:#151513;
    --soft-charcoal:#22211E;
    --dark-border:#3A352C;
    --line-green:#20B94D;
    --line-green-hover:#128C3A;
  }
  html, body { background: var(--ivory); color: var(--ink); }
  body { font-family: 'Noto Sans JP', 'Yu Gothic', 'Hiragino Sans', sans-serif; -webkit-font-smoothing:antialiased; }
  .font-mincho { font-family: 'Noto Serif JP','Shippori Mincho','Yu Mincho', serif; }
  .font-cormorant { font-family: 'Cormorant Garamond','Playfair Display', serif; letter-spacing:.06em; }
  .font-cinzel { font-family: 'Cinzel', serif; letter-spacing:.18em; }
  .font-script { font-family: 'Dancing Script', cursive; letter-spacing:.01em; }

  /* Marker highlight */
  .marker {
    background: linear-gradient(transparent 62%, rgba(181,154,106,.28) 62%);
    padding: 0 .12em;
  }

  /* Faded background typography */
  .bg-type {
    position:absolute; pointer-events:none; user-select:none;
    font-family:'Cormorant Garamond', serif; font-weight:500;
    color: rgba(30,30,28,.06);
    line-height: .9;
    letter-spacing: .02em;
    white-space: nowrap;
  }

  /* Vertical ribbon (top-left) */
  .v-ribbon {
    background: linear-gradient(180deg, #1E1E1C 0%, #2A2926 100%);
    color: #F3EFE5;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 88%, 0 100%);
    box-shadow: 0 8px 24px -12px rgba(0,0,0,.45);
  }

  /* Side label (vertical) */
  .vlabel {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    letter-spacing: .35em;
  }

  /* Diamond divider dot */
  .diamond {
    width:6px; height:6px; transform: rotate(45deg);
    background: var(--gold);
    display:inline-block;
  }

  /* Subtle paper grain on hero */
  .paper-grain {
    background-image:
      radial-gradient(rgba(30,30,28,.025) 1px, transparent 1px),
      radial-gradient(rgba(181,154,106,.04) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }

  /* Hero photo placeholder (image_slot replacement) */
  .photo-ph {
    background:
      linear-gradient(135deg, #2a2926 0%, #1a1916 60%, #0f0e0c 100%);
    position:relative; overflow:hidden;
  }
  .photo-ph::before{
    content:""; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 2px, transparent 2px 14px);
    mix-blend-mode: overlay;
  }
  .photo-ph::after{
    content: attr(data-label);
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    font-family: 'Cormorant Garamond', monospace, serif;
    color: rgba(255,255,255,.35);
    letter-spacing:.4em; font-size:11px; text-transform:uppercase;
    white-space:nowrap;
  }

  /* CTA */
  .cta-dark {
    background: linear-gradient(180deg, #1E1E1C 0%, #0F0E0C 100%);
    border: 1px solid rgba(216,199,164,.45);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 14px 30px -18px rgba(0,0,0,.55);
    transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
  }
  .cta-dark:hover {
    background: linear-gradient(180deg, #2A2926 0%, #1A1916 100%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 18px 36px -16px rgba(0,0,0,.6);
    transform: translateY(-1px);
  }
  .cta-dark .cta-frame{
    border:1px solid rgba(216,199,164,.35);
  }

  /* Arrow loop animation (subtle) */
  @keyframes arrowDrift {
    0%,100% { transform: translateX(0); opacity:.45; }
    50%     { transform: translateX(6px); opacity:.85; }
  }
  .arrow-drift svg { animation: arrowDrift 2.4s ease-in-out infinite; }

  /* Round emblem */
  .emblem {
    background: #fff;
    border:1px solid rgba(181,154,106,.45);
    box-shadow: 0 6px 22px -10px rgba(30,30,28,.18);
  }

  /* Hide decorative pieces on small screens */
  @media (max-width: 1000px){
    .pc-only { display:none !important; }
  }
  @media (max-width: 560px){
    .tablet-only { display:none !important; }
  }

  /* Smooth horizontal scroll guard */
  html, body { overflow-x: clip; }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

/* ---------- Reusable atoms ---------- */
function VRibbon({ children }){
  return (
    <div className="v-ribbon w-[88px] sm:w-[100px] md:w-[112px] py-5 px-3 flex items-center justify-center">
      <div className="flex flex-col items-center gap-3">
        {/* small machine icon */}
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 14h6l3-3 3 3v3h-3" stroke="#D8C7A4" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"/>
          <circle cx="8" cy="14" r="1.6" stroke="#D8C7A4" strokeWidth="1"/>
          <path d="M14 11l2-4h2" stroke="#D8C7A4" strokeWidth="1" strokeLinecap="round"/>
        </svg>
        <div className="font-cinzel text-[10px] sm:text-[11px] text-[#E8DDCB] text-center leading-[1.9]">
          {children}
        </div>
      </div>
    </div>
  );
}

function HandwrittenNote({ className = "", children, color = "rgba(181,154,106,.85)" }){
  return (
    <span className={`font-script ${className}`} style={{ color, fontSize:'inherit' }}>
      {children}
    </span>
  );
}

function DiamondDivider({ width = 80 }){
  return (
    <div className="flex items-center gap-2" aria-hidden="true">
      <span className="block h-px bg-[rgba(181,154,106,.5)]" style={{ width }} />
      <span className="diamond" />
      <span className="block h-px bg-[rgba(181,154,106,.5)]" style={{ width }} />
    </div>
  );
}

function LineCTA(){
  return (
    <a
      href="#contact"
      className="cta-dark group inline-flex items-center w-full sm:w-auto"
      style={{ borderRadius: 4, padding: '4px' }}
      aria-label="LINEで無料相談する"
    >
      <span className="cta-frame flex items-center justify-between w-full sm:w-[420px] px-5 sm:px-6 py-4 sm:py-5" style={{ borderRadius: 2 }}>
        <span className="flex items-center gap-3 sm:gap-4">
          {/* LINE chip */}
          <span className="inline-flex items-center justify-center w-9 h-9 rounded-md" style={{ background:'#20B94D' }}>
            <span className="font-cinzel text-[10px] font-semibold text-white tracking-[0.2em]">LINE</span>
          </span>
          <span className="font-mincho text-white text-[15px] sm:text-[17px] tracking-[.08em]">
            LINEで無料相談する
          </span>
        </span>
        <span className="arrow-drift text-[#D8C7A4]">
          <svg width="22" height="10" viewBox="0 0 22 10" fill="none" aria-hidden="true">
            <path d="M1 5h19M16 1l4 4-4 4" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </span>
      </span>
    </a>
  );
}

/* ---------- HERO (FV) ---------- */
function Hero(){
  return (
    <section
      data-screen-label="01 Hero"
      className="p-hero relative w-full paper-grain"
      style={{ background: 'linear-gradient(100deg, #F8F5EF 0%, #F3EFE5 55%, #EFE7D6 100%)' }}
    >
      {/* faded background English type */}
      <div className="bg-type pc-only" style={{ top: '6%', left: '14%', fontSize: 'clamp(120px, 13vw, 220px)' }} aria-hidden="true">
        TATTOO
      </div>
      <div className="bg-type pc-only" style={{ top: '24%', left: '6%', fontSize: 'clamp(120px, 13vw, 220px)' }} aria-hidden="true">
        ARTIST
      </div>

      {/* left vertical ribbon */}
      <div className="absolute top-0 left-6 sm:left-10 z-20">
        <VRibbon>
          TATTOO<br/>ARTIST<br/>SCHOOL
        </VRibbon>
      </div>

      {/* far-left vertical micro label */}
      <div className="absolute left-3 top-1/2 -translate-y-1/2 z-10 hidden md:flex items-center gap-3">
        <span className="block w-px h-12 bg-[rgba(181,154,106,.6)]" aria-hidden="true" />
        <span className="vlabel font-cinzel text-[10px] text-[#8a7e64]">
          MAKE ART YOUR LIFE.
        </span>
        <span className="block w-px h-12 bg-[rgba(181,154,106,.6)]" aria-hidden="true" />
      </div>

      {/* Inner */}
      <div className="relative max-w-[1240px] mx-auto px-5 sm:px-8 lg:px-12 pt-[120px] sm:pt-[140px] lg:pt-[120px] pb-20 sm:pb-24 lg:pb-32">
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 lg:gap-12 items-center">

          {/* LEFT — copy */}
          <div className="relative lg:col-span-7 z-10 lg:pl-20 xl:pl-24 order-2 lg:order-1">
            {/* Main copy */}
            <h1 className="font-mincho text-[#1E1E1C] leading-[1.18] tracking-[.01em]"
                style={{ fontSize: 'clamp(36px, 6.4vw, 80px)', fontWeight: 500 }}>
              <span className="block">
                <span className="font-mincho text-[#2A2926]" style={{ fontWeight: 400 }}>「</span>
                <span className="marker">趣味</span>
                <span className="font-mincho text-[#2A2926]" style={{ fontWeight: 400 }}>」</span>
                を、
              </span>
              <span className="block mt-2 sm:mt-3">
                一生モノの<span className="text-[#1E1E1C]">職</span>へ。
              </span>
            </h1>

            {/* sub copy */}
            <p className="mt-7 sm:mt-9 font-mincho text-[#3a3833] tracking-[.06em]"
               style={{ fontSize: 'clamp(14px, 1.4vw, 18px)', lineHeight: 1.95 }}>
              最短<span className="font-cormorant text-[#1E1E1C] mx-0.5" style={{ fontSize: '1.15em' }}>3</span>ヶ月で、タトゥーアーティストとしての一歩を。
            </p>

            {/* divider */}
            <div className="mt-7 sm:mt-9">
              <DiamondDivider width={56} />
            </div>

            {/* CTA */}
            <div className="mt-7 sm:mt-9 flex flex-col sm:flex-row sm:items-center gap-4 sm:gap-6">
              <LineCTA />
              <div className="flex items-center gap-2 text-[#6F6A62] text-[12px] tracking-[.14em]">
                <span className="inline-block w-1.5 h-1.5 rounded-full bg-[#20B94D]" aria-hidden="true" />
                <span>相談無料 / 30秒で予約完了</span>
              </div>
            </div>

            {/* bottom-left handwritten quote (PC) */}
            <div className="mt-14 lg:mt-20 pc-only">
              <div className="font-script text-[#9c8a64]" style={{ fontSize: '20px', lineHeight: 1.6 }}>
                Tattoo is more than ink.<br/>
                It's your story.
              </div>
            </div>
          </div>

          {/* RIGHT — photo + decorative callouts */}
          <div className="relative lg:col-span-5 order-1 lg:order-2">
            {/* Photo */}
            <img
              src="img/clinic-hero.png"
              alt="清潔なタトゥースタジオでの施術写真"
              className="w-full object-cover"
              style={{ aspectRatio: '4 / 5', borderRadius: '2px' }}
            />

            {/* Top callout box */}
            <div className="absolute -top-3 -left-6 sm:-top-4 sm:-left-10 lg:-left-16 z-20 hidden sm:block">
              <div className="bg-white border border-[rgba(181,154,106,.5)] px-5 py-3 shadow-[0_10px_30px_-18px_rgba(30,30,28,.3)]">
                <div className="font-cinzel text-[10.5px] text-[#3a3833] leading-[1.7] tracking-[.18em]">
                  TURN YOUR PASSION<br/>INTO YOUR CAREER.
                </div>
              </div>
              {/* connector */}
              <svg className="absolute -bottom-6 right-4" width="46" height="32" viewBox="0 0 46 32" fill="none" aria-hidden="true">
                <path d="M2 2 C 16 12, 30 22, 44 30" stroke="rgba(181,154,106,.7)" strokeWidth="1" fill="none"/>
                <circle cx="44" cy="30" r="1.5" fill="#B59A6A"/>
              </svg>
            </div>

            {/* Script note above photo */}
            <div className="absolute -top-1 right-2 sm:right-6 lg:-right-2 z-10 text-right pc-only">
              <div className="font-script text-[#a08a5e]" style={{ fontSize: '24px', lineHeight: 1.4 }}>
                Be yourself,<br/>
                Be an artist.
              </div>
            </div>

            {/* Round emblem */}
            <div className="absolute -bottom-8 -right-4 sm:-bottom-10 sm:-right-6 lg:-right-10 z-20">
              <div className="emblem rounded-full w-[120px] h-[120px] sm:w-[140px] sm:h-[140px] flex items-center justify-center relative">
                {/* circular text */}
                <svg viewBox="0 0 140 140" className="absolute inset-0 w-full h-full" aria-hidden="true">
                  <defs>
                    <path id="circ-top" d="M 70,70 m -54,0 a 54,54 0 1,1 108,0" />
                    <path id="circ-bot" d="M 70,70 m -54,0 a 54,54 0 1,0 108,0" />
                  </defs>
                  <text fill="#6F6A62" style={{ fontFamily:'Cinzel', fontSize:'9px', letterSpacing:'.32em' }}>
                    <textPath href="#circ-top" startOffset="6%">CREATE · DESIGN · INSPIRE</textPath>
                  </text>
                  <text fill="#6F6A62" style={{ fontFamily:'Cinzel', fontSize:'9px', letterSpacing:'.32em' }}>
                    <textPath href="#circ-bot" startOffset="14%">TATTOO LIFE · EST. SCHOOL</textPath>
                  </text>
                </svg>
                {/* center machine icon */}
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 14h6l3-3 3 3v3h-3" stroke="#B59A6A" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round"/>
                  <circle cx="8" cy="14" r="1.6" stroke="#B59A6A" strokeWidth="1.1"/>
                  <path d="M14 11l2-4h2" stroke="#B59A6A" strokeWidth="1.1" strokeLinecap="round"/>
                </svg>
              </div>
            </div>

            {/* corner gold ticks */}
            <span className="absolute -top-2 -right-2 w-6 h-6 border-t border-r border-[rgba(181,154,106,.7)] hidden sm:block" aria-hidden="true" />
            <span className="absolute -bottom-2 -left-2 w-6 h-6 border-b border-l border-[rgba(181,154,106,.7)] hidden sm:block" aria-hidden="true" />
          </div>
        </div>
      </div>

      {/* bottom soft fade into next section (placeholder) */}
      <div className="absolute bottom-0 inset-x-0 h-12 pointer-events-none"
           style={{ background: 'linear-gradient(180deg, transparent, #F8F5EF)' }} aria-hidden="true" />
    </section>
  );
}

/* ---------- SECTION 02 — PROBLEM / お悩み ---------- */
function Problem(){
  const items = [
    { lead: '何から始めればいいか', tail: '分からない', mark: '分からない' },
    { lead: '独学で練習しているけど', tail: '上達しない', mark: '上達しない' },
    { lead: '絵に', tail: '自信がない', mark: '自信がない' },
    { lead: '道具や衛生管理が', tail: '不安', mark: '不安' },
    { lead: '好きを仕事にできるか', tail: '不安', mark: '不安' },
  ];

  return (
    <section
      data-screen-label="02 Problem"
      className="p-problem relative w-full"
      style={{ background: 'linear-gradient(180deg, #F8F5EF 0%, #F5F0E4 100%)' }}
    >
      {/* Faint background "WORRY" */}
      <div className="bg-type pc-only" style={{ top: '6%', right: '8%', fontSize: 'clamp(120px, 14vw, 220px)' }} aria-hidden="true">
        WORRY
      </div>

      {/* Side ribbon — small variant aligned with hero rhythm */}
      <div className="absolute top-0 left-6 sm:left-10 z-20">
        <VRibbon>TATTOO<br/>ARTIST<br/>SCHOOL</VRibbon>
      </div>

      <div className="absolute left-3 top-[280px] z-10 hidden md:flex flex-col items-center gap-3">
        <span className="block w-px h-10 bg-[rgba(181,154,106,.5)]" aria-hidden="true" />
        <span className="vlabel font-cinzel text-[10px] text-[#8a7e64]">TATTOO ARTIST SCHOOL</span>
      </div>

      {/* faint sketch decoration top-right */}
      <svg className="absolute top-12 right-10 pc-only opacity-40" width="160" height="120" viewBox="0 0 160 120" fill="none" aria-hidden="true">
        <path d="M40 80 C 50 40, 90 30, 110 60 S 140 100, 120 110" stroke="#B59A6A" strokeWidth=".8" fill="none"/>
        <circle cx="78" cy="58" r="14" stroke="#B59A6A" strokeWidth=".8" fill="none"/>
        <path d="M70 58 q 8 -8 16 0 q -8 8 -16 0" stroke="#B59A6A" strokeWidth=".7" fill="none"/>
      </svg>

      <div className="relative max-w-[1240px] mx-auto px-5 sm:px-8 lg:px-12 pt-[120px] sm:pt-[140px] pb-24 sm:pb-28 lg:pb-32">

        {/* Heading */}
        <div className="relative lg:pl-20 xl:pl-24 max-w-[860px]">
          <h2 className="font-mincho text-[#1E1E1C] leading-[1.3] tracking-[.02em]"
              style={{ fontSize: 'clamp(28px, 4.6vw, 56px)', fontWeight: 500 }}>
            <span className="block">最近、</span>
            <span className="block mt-2">
              こんな<span className="marker font-mincho" style={{ fontWeight: 600 }}>お悩み</span>
            </span>
            <span className="block mt-2">ありませんか？</span>
          </h2>

          {/* handwritten note top-right of heading */}
          <div className="absolute top-2 right-0 sm:right-4 hidden sm:flex items-end gap-2">
            <div className="relative px-4 py-2 border border-[rgba(181,154,106,.55)] bg-white/80">
              <span className="font-script text-[#8a7548]" style={{ fontSize: '15px' }}>
                独学で<br/>練習してるのに…
              </span>
              <span className="absolute -bottom-2 left-6 w-3 h-3 bg-white border-r border-b border-[rgba(181,154,106,.55)] rotate-45" aria-hidden="true" />
            </div>
          </div>

          <div className="mt-7 flex items-center gap-3" aria-hidden="true">
            <span className="diamond" />
            <span className="block h-px w-32 bg-[rgba(181,154,106,.4)]" />
            <span className="diamond" />
          </div>
        </div>

        {/* Body: checklist + portrait */}
        <div className="mt-12 sm:mt-16 grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-10 items-start">

          {/* Checklist card */}
          <div className="lg:col-span-7 relative">
            {/* tape */}
            <span className="absolute -top-3 left-8 w-16 h-5 bg-[rgba(30,30,28,.85)] rotate-[-4deg] hidden sm:block opacity-80" aria-hidden="true" />
            <span className="absolute -top-3 right-10 w-14 h-5 bg-[rgba(30,30,28,.75)] rotate-[3deg] hidden sm:block opacity-80" aria-hidden="true" />

            <div className="bg-white border border-[rgba(181,154,106,.55)] shadow-[0_24px_60px_-30px_rgba(30,30,28,.25)] p-7 sm:p-10 lg:p-12 relative">
              {/* inner gold border */}
              <div className="absolute inset-2 border border-[rgba(181,154,106,.3)] pointer-events-none" aria-hidden="true" />

              <div className="font-script text-[#9c8a64] mb-5 sm:mb-7" style={{ fontSize: '22px' }}>
                Check List
              </div>

              <ul className="relative">
                {items.map((it, i) => (
                  <li key={i} className={`flex items-start gap-4 sm:gap-5 py-4 sm:py-5 ${i !== items.length - 1 ? 'border-b border-dashed border-[rgba(181,154,106,.35)]' : ''}`}>
                    {/* check box */}
                    <span className="flex-shrink-0 mt-1 w-6 h-6 sm:w-7 sm:h-7 border border-[rgba(30,30,28,.75)] flex items-center justify-center" aria-hidden="true">
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2 7l3.5 3.5L12 3" stroke="#B59A6A" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </span>
                    <span className="font-mincho text-[#1E1E1C] leading-[1.7]"
                          style={{ fontSize: 'clamp(15px, 1.4vw, 18px)' }}>
                      {it.lead}
                      <br className="sm:hidden" />
                      <span className="marker">{it.tail}</span>
                    </span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          {/* Right column — portrait + handwritten */}
          <div className="lg:col-span-5 relative">
            <img
              src="img/image%204.png"
              alt="独学で悩んでいる学習者の写真"
              className="w-full object-cover"
              style={{ aspectRatio: '4 / 5', borderRadius: '2px' }}
            />

            {/* handwritten callout bottom-left */}
