<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Re'ink Tattoo Artist School</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600&family=Dancing+Script:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <style>
    :root {
      --white: #FFFFFF;
      --ivory: #F8F5EF;
      --beige: #E8DDCB;
      --light-gray: #F3F1EC;
      --ink: #1E1E1C;
      --soft-ink: #2A2926;
      --gray-text: #6F6A62;
      --gold: #B59A6A;
      --pale-gold: #D8C7A4;
      --line-beige: #CDBB9D;
      --charcoal: #151513;
      --soft-charcoal: #22211E;
      --dark-border: #3A352C;
      --line-green: #20B94D;
      --line-green-hover: #128C3A;
    }

    html,
    body {
      background: var(--ivory);
      color: var(--ink);
    }

    body {
      font-family: 'Noto Serif JP', serif;
      -webkit-font-smoothing: antialiased;
    }

    .feature-section {
      position: relative;
      width: 100%;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .96) 0%, rgba(255, 255, 255, .94) 44%, rgba(246, 242, 236, .96) 100%);
      border-top: 1px solid #e4ded4;
      border-bottom: 1px solid #e4ded4;
    }

    .feature-section::before,
    .feature-section::after {
      content: "";
      position: absolute;
      inset: 16px;
      pointer-events: none;
      border: 1px solid rgba(190, 175, 151, .28);
    }

    .feature-section::after {
      inset: 22px;
      border-color: rgba(255, 255, 255, .75);
    }

    .feature-section__inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(360px, 45%) minmax(0, 55%);
      align-items: center;
      min-height: 560px;
      padding: 24px 34px 28px 72px;
    }

    .feature-section__content {
      position: relative;
      padding: 72px 40px 56px 36px;
    }

    .feature-section__number {
      position: absolute;
      top: -20px;
      left: -34px;
      color: rgba(151, 139, 124, .08);
      font-size: clamp(150px, 15vw, 250px);
      font-weight: 500;
      font-style: italic;
      line-height: .8;
      letter-spacing: -.08em;
      z-index: -1;
    }

    .feature-section__label {
      width: fit-content;
      margin: 0 auto 30px;
      padding: 7px 28px 6px;
      color: #b49a6d;
      font-family: "Cormorant Garamond", serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: .18em;
      line-height: 1;
      background: #fff;
      border: 1px solid #c9b794;
      box-shadow:
        0 0 0 3px #fff inset,
        0 0 0 1px rgba(201, 183, 148, .55),
        0 3px 12px rgba(98, 80, 49, .08);
    }

    .feature-section__title {
      margin: 0;
      font-size: clamp(42px, 4.5vw, 70px);
      font-weight: 400;
      line-height: 1.33;
      letter-spacing: .18em;
      text-align: center;
      text-shadow: 3px 3px 0 rgba(0, 0, 0, .055);
    }

    .feature-section__divider {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 34px auto 38px;
    }

    .feature-section__divider span {
      position: relative;
      display: block;
      width: min(100%, 520px);
      height: 1px;
      background: linear-gradient(90deg, transparent, #cfc5b5 15%, #cfc5b5 85%, transparent);
    }

    .feature-section__divider span::before,
    .feature-section__divider span::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 9px;
      height: 9px;
      background: #b69d74;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .feature-section__divider span::after {
      width: 4px;
      height: 4px;
      background: #fff;
    }

    .feature-section__text {
      margin: 0;
      color: #4a4a4a;
      font-size: clamp(18px, 1.6vw, 28px);
      font-weight: 500;
      line-height: 2.05;
      letter-spacing: .08em;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, .045);
    }

    .feature-section__text strong {
      color: #9f7d48;
      font-weight: 600;
    }

    .feature-section__visual {
      position: relative;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 10px 26px;
    }

    .feature-section__image-wrap {
      position: relative;
      width: 100%;
      max-width: 850px;
      aspect-ratio: 820 / 520;
      overflow: hidden;
      border: 1px solid rgba(184, 171, 148, .72);
      box-shadow: 0 12px 28px rgba(35, 29, 21, .12);
      background: #e8e1d7;
    }

    .feature-section__image-wrap::before,
    .feature-section__image-wrap::after {
      content: "";
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }

    .feature-section__image-wrap::before {
      inset: 0;
      border: 6px solid rgba(255, 255, 255, .86);
    }

    .feature-section__image-wrap::after {
      inset: 14px;
      border: 1px solid rgba(255, 255, 255, .55);
    }

    .feature-section__image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .feature-section__badge {
      position: absolute;
      top: 0;
      right: 32px;
      z-index: 4;
      width: 150px;
      min-height: 176px;
      padding: 24px 14px 20px;
      color: #d2b887;
      text-align: center;
      background: linear-gradient(180deg, #181817, #11100f);
      border: 1px solid rgba(187, 157, 100, .55);
      box-shadow: 0 12px 24px rgba(0, 0, 0, .22);
    }

    .feature-section__badge::before,
    .feature-section__badge::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      height: 1px;
      background: rgba(187, 157, 100, .55);
    }

    .feature-section__badge::before {
      top: 8px;
    }

    .feature-section__badge::after {
      bottom: 8px;
    }

    .feature-section__badge p {
      margin: 18px 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: .16em;
    }

    .feature-section__badge-icon {
      position: relative;
      width: 64px;
      height: 50px;
      margin: 0 auto;
    }

    .feature-section__badge-icon span {
      position: absolute;
      bottom: 0;
      width: 28px;
      height: 26px;
      border: 2px solid #d2b887;
      border-radius: 50% 50% 0 0;
    }

    .feature-section__badge-icon span:nth-child(1) {
      left: 0;
    }

    .feature-section__badge-icon span:nth-child(2) {
      left: 18px;
      bottom: 8px;
    }

    .feature-section__badge-icon span:nth-child(3) {
      right: 0;
    }

    .feature-section__bottom-mark {
      position: absolute;
      left: 50%;
      bottom: -18px;
      z-index: 3;
      width: 98px;
      height: 64px;
      transform: translateX(-50%);
      background: linear-gradient(135deg, transparent 47%, #d4c1a1 48%, #fff 54%, transparent 55%),
        linear-gradient(225deg, transparent 47%, #d4c1a1 48%, #fff 54%, transparent 55%);
      background-size: 50% 100%;
      background-repeat: no-repeat;
      background-position: left top, right top;
    }

    @media (max-width: 1024px) {
      .feature-section__inner {
        grid-template-columns: 1fr;
        padding: 42px 22px 54px;
        gap: 22px;
      }

      .feature-section__content {
        padding: 52px 16px 22px;
      }

      .feature-section__text {
        text-align: center;
      }

      .feature-section__visual {
        padding: 0;
      }

      .feature-section__badge {
        right: 18px;
        width: 128px;
        min-height: 150px;
        padding-top: 18px;
      }
    }

    @media (max-width: 640px) {
      .pc-only {
        display: none;
      }

      .feature-section::before,
      .feature-section::after {
        inset: 10px;
      }

      .feature-section__inner {
        padding: 28px 14px 44px;
      }

      .feature-section__content {
        padding: 46px 8px 12px;
      }

      .feature-section__label {
        margin-bottom: 22px;
        font-size: 16px;
      }

      .feature-section__title {
        letter-spacing: .12em;
      }

      .feature-section__divider {
        margin: 24px auto 26px;
      }

      .feature-section__text {
        font-size: 16px;
        line-height: 1.9;
        letter-spacing: .04em;
      }

      .feature-section__badge {
        top: -10px;
        right: 10px;
        transform: scale(.78);
        transform-origin: top right;
      }
    }

    .p-challenge-card {
      position: relative;
      width: 100%;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .96) 0%, rgba(255, 255, 255, .94) 44%, rgba(246, 242, 236, .96) 100%);
      border-top: 1px solid #e4ded4;
      border-bottom: 1px solid #e4ded4;
    }

    .p-challenge-card::before,
    .p-challenge-card::after {
      content: "";
      position: absolute;
      inset: 16px;
      pointer-events: none;
      border: 1px solid rgba(190, 175, 151, .28);
    }

    .p-challenge-card::after {
      inset: 22px;
      border-color: rgba(255, 255, 255, .75);
    }

    .p-challenge-card__inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(300px, 45%) minmax(0, 55%);
      align-items: center;
      min-height: 460px;
      padding: 24px 34px 28px 72px;
    }

    @media (max-width: 1024px) {
      .p-challenge-card__inner {
        grid-template-columns: 1fr;
        padding: 42px 22px 54px;
        gap: 22px;
      }
    }

    @media (max-width: 640px) {

      .p-challenge-card::before,
      .p-challenge-card::after {
        inset: 10px;
      }

      .p-challenge-card__inner {
        padding: 28px 14px 44px;
      }
    }

    .font-mincho {
      font-family: 'Noto Serif JP', serif;
    }

    /* Marker highlight */
    .marker {
      background: linear-gradient(transparent 60%, rgba(183, 155, 99, 0.45) 60%);
      padding: 0 .12em;
      font-size: 1.3em;
      font-weight: 600;
    }

    /* Faded background typography */
    .bg-type {
      position: absolute;
      pointer-events: none;
      user-select: none;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      color: rgba(30, 30, 28, .06);
      line-height: .9;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    /* Vertical ribbon (top-left) */
    .v-ribbon {
      background: linear-gradient(180deg, #1E1E1C 0%, #2A2926 100%);
      color: #F3EFE5;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 88%, 0 100%);
      box-shadow: 0 8px 24px -12px rgba(0, 0, 0, .45);
    }

    /* Side label (vertical) */
    .vlabel {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: .35em;
    }

    /* Diamond divider dot */
    .diamond {
      width: 6px;
      height: 6px;
      transform: rotate(45deg);
      background: var(--gold);
      display: inline-block;
    }

    /* Subtle paper grain on hero */
    .paper-grain {
      background-image:
        radial-gradient(rgba(30, 30, 28, .025) 1px, transparent 1px),
        radial-gradient(rgba(181, 154, 106, .04) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 2px;
    }

    /* Hero photo placeholder (image_slot replacement) */
    .photo-ph {
      background:
        linear-gradient(135deg, #2a2926 0%, #1a1916 60%, #0f0e0c 100%);
      position: relative;
      overflow: hidden;
    }

    .photo-ph::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(135deg, rgba(255, 255, 255, .025) 0 2px, transparent 2px 14px);
      mix-blend-mode: overlay;
    }

    .photo-ph::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Cormorant Garamond', monospace, serif;
      color: rgba(255, 255, 255, .35);
      letter-spacing: .4em;
      font-size: 11px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* CTA */
    .cta-dark {
      background: linear-gradient(145deg, #06C755 0%, #04A847 60%, #039940 100%);
      border: 1px solid rgba(255, 255, 255, .35);
      box-shadow: 0 6px 24px -8px rgba(6, 199, 85, .55), inset 0 1px 0 rgba(255, 255, 255, .25), inset 0 -1px 0 rgba(0, 0, 0, .08);
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .cta-dark:hover {
      background: linear-gradient(145deg, #07D95D 0%, #06C755 60%, #04A847 100%);
      box-shadow: 0 10px 32px -6px rgba(6, 199, 85, .65), inset 0 1px 0 rgba(255, 255, 255, .3), inset 0 -1px 0 rgba(0, 0, 0, .1);
      transform: translateY(-2px);
    }

    .cta-dark .cta-frame {
      border: 1px solid rgba(255, 255, 255, .3);
    }

    /* Arrow */

    /* Round emblem */
    .emblem {
      background: #fff;
      border: 1px solid rgba(181, 154, 106, .45);
      box-shadow: 0 6px 22px -10px rgba(30, 30, 28, .18);
    }

    /* Hide decorative pieces on small screens */
    @media (max-width: 1000px) {
      .pc-only {
        display: none !important;
      }
    }

    @media (max-width: 560px) {
      .tablet-only {
        display: none !important;
      }
    }

    /* Hero — left-to-center beige fade over photo */
    .p-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: linear-gradient(90deg,
          #F5F0E8 0%,
          #F5F0E8 50%,
          rgba(245, 240, 232, 0.94) 58%,
          rgba(245, 240, 232, 0.7) 66%,
          rgba(245, 240, 232, 0.3) 74%,
          rgba(245, 240, 232, 0.08) 82%,
          transparent 90%);
    }

    /* Smooth horizontal scroll guard */
    html,
    body {
      overflow-x: clip;
    }


    .curriculum-ribbon {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;

      height: 46px;
      padding: 0 30px;

      background: linear-gradient(135deg,
          #b59a6a 0%,
          #c9ae7d 100%);

      color: #fff;

      transform: skewX(-18deg);

      box-shadow:
        0 10px 24px rgba(181, 154, 106, .22),
        inset 0 1px 0 rgba(255, 255, 255, .15);

      border: 1px solid rgba(255, 255, 255, .12);

      overflow: hidden;

      &__step,
      &__num {
        position: relative;
        z-index: 2;

        transform: skewX(18deg);
      }

      &__step {
        font-size: 10px;
        letter-spacing: .35em;
        font-family: var(--font-mincho);
      }

      &__num {
        font-size: 20px;
        line-height: 1;
        font-family: var(--font-mincho);
      }

      &::before {
        content: "";
        position: absolute;
        inset: 0;

        background:
          linear-gradient(180deg,
            rgba(255, 255, 255, .18) 0%,
            rgba(255, 255, 255, 0) 100%);

        mix-blend-mode: screen;
      }
    }

    /* .curriculum-step-item:nth-child(2) .curriculum-ribbon {
      background: linear-gradient(135deg, #8f7652 0%, #b59a6a 100%);
    }

    .curriculum-step-item:nth-child(3) .curriculum-ribbon {
      background: linear-gradient(135deg, #6e5840 0%, #a78d63 100%);
    } */
  </style>

  <script type="application/json" id="speaker-notes">[]</script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState } = React;

    /* ---------- Reusable atoms ---------- */
    function VRibbon({ children }) {
      return (
        <div className="v-ribbon w-[88px] sm:w-[100px] md:w-[112px] py-5 px-3 flex items-center justify-center">
          <div className="flex flex-col items-center gap-3">
            {/* small machine icon */}
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 14h6l3-3 3 3v3h-3" stroke="#D8C7A4" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" />
              <circle cx="8" cy="14" r="1.6" stroke="#D8C7A4" strokeWidth="1" />
              <path d="M14 11l2-4h2" stroke="#D8C7A4" strokeWidth="1" strokeLinecap="round" />
            </svg>
            <div className="font-mincho text-[10px] sm:text-[11px] text-[#E8DDCB] text-center leading-[1.9]">
              {children}
            </div>
          </div>
        </div>
      );
    }

    function HandwrittenNote({ className = "", children, color = "rgba(181,154,106,.85)" }) {
      return (
        <span className={`font-mincho ${className}`} style={{ color, fontSize: 'inherit' }}>
          {children}
        </span>
      );
    }

    function DiamondDivider({ width = 80 }) {
      return (
        <div className="flex items-center gap-2" aria-hidden="true">
          <span className="block h-px bg-[rgba(181,154,106,.5)]" style={{ width }} />
          <span className="diamond" />
          <span className="block h-px bg-[rgba(181,154,106,.5)]" style={{ width }} />
        </div>
      );
    }

    function LineCTA({ label = "LINEで無料相談する" }) {
      return (
        <a
          href="#contact"
          className="cta-dark group inline-flex items-center w-full sm:w-auto"
          style={{ borderRadius: 4, padding: '4px' }}
          aria-label={label}
        >
          <span className="cta-frame flex items-center justify-between w-full sm:w-[420px] px-5 sm:px-6 py-4 sm:py-5" style={{ borderRadius: 2 }}>
            <span className="flex items-center gap-3 sm:gap-4">
              {/* LINE chip */}
              <span className="inline-flex items-center justify-center w-9 h-9 rounded-md" style={{ background: 'rgba(255,255,255,0.22)', border: '1px solid rgba(255,255,255,0.4)' }}>
                <img src="img/icon/line.png" alt="LINE" className="w-5 h-5 object-contain" />
              </span>
              <span className="font-mincho text-white text-[15px] sm:text-[17px] tracking-[.08em] font-semibold drop-shadow-sm">
                {label}
              </span>
            </span>
            <span className="text-white">
              <svg width="28" height="14" viewBox="0 0 28 14" fill="none" aria-hidden="true">
                <path d="M1 7h24M19 1l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </span>
          </span>
        </a>
      );
    }

    /* ---------- HERO (FV) ---------- */
    function Hero() {
      return (
        <section
          data-screen-label="01 Hero"
          className="p-hero relative w-full overflow-hidden"
          style={{
            minHeight: '100vh',
            background: '#F5F0E8',
            display: 'flex',
            flexDirection: 'column',
          }}
        >
          {/* FULL-WIDTH background photo (gradient handles the left mask) */}
          <div className="absolute inset-0 hidden lg:block">
            <img
              src="img/clinic-hero.png"
              alt="タトゥーアーティストが施術している写真"
              className="w-full h-full object-cover"
              style={{ objectPosition: 'right center' }}
            />
          </div>

          {/* Mobile photo — in-flow */}
          <div className="block lg:hidden w-full" style={{ height: 260 }}>
            <img
              src="img/clinic-hero.png"
              alt="タトゥーアーティストが施術している写真"
              className="w-full h-full object-cover object-center"
            />
          </div>

          {/* SCROLL indicator — far right vertical */}
          <div className="absolute hidden lg:flex flex-col items-center gap-3 z-30"
            style={{ right: 28, top: '50%', transform: 'translateY(-50%)' }}>
            <span className="block w-px bg-[#b5a898]" style={{ height: 80 }} aria-hidden="true" />
            <span className="vlabel text-[9px] tracking-[.38em] text-[#9a8e80]"
              style={{ fontFamily: 'Cinzel, serif', writingMode: 'vertical-rl' }}>
              SCROLL
            </span>
            <svg width="10" height="22" viewBox="0 0 10 22" fill="none" aria-hidden="true">
              <line x1="5" y1="0" x2="5" y2="18" stroke="#9a8e80" strokeWidth="1" />
              <polyline points="1,14 5,20 9,14" stroke="#9a8e80" strokeWidth="1" fill="none" />
            </svg>
          </div>

          {/* ── Left content column ── */}
          <div className="relative z-10 flex flex-col"
            style={{ width: '100%', maxWidth: '65%', minWidth: 320, minHeight: '100vh' }}>

            {/* Top nav bar */}
            <div className="flex items-center justify-between px-8 lg:px-10"
